name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TRIVY_VERSION: v0.70.0

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Build a single-arch image into the local Docker daemon so Trivy can scan it
      # before we spend time building all other architectures.
      - name: Build local image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: portly:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy ${{ env.TRIVY_VERSION }}
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"
          trivy --version

      - name: Scan image with Trivy
        run: |
          trivy image \
            --scanners vuln \
            --exit-code 1 \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            portly:scan

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        run: |
          trivy image \
            --scanners vuln \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output trivy-results.sarif \
            portly:scan || true

      - uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request' && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Platforms supported by gcr.io/distroless/static-debian12.
          platforms: |
            linux/amd64
            linux/arm64
            linux/arm/v7
            linux/ppc64le
            linux/s390x
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

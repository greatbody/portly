<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>portly - login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #0f172a; color: #e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0;}
  .card { background:#1e293b; padding:32px; border-radius:12px; width:340px; box-shadow:0 10px 40px rgba(0,0,0,.4); }
  h1 { margin:0 0 8px; font-size:22px; }
  p.sub { margin:0 0 24px; color:#94a3b8; font-size:13px; }
  label { display:block; font-size:12px; color:#94a3b8; margin:12px 0 4px; }
  input { width:100%; box-sizing:border-box; padding:10px 12px; border-radius:8px; border:1px solid #334155;
    background:#0f172a; color:#e2e8f0; font-size:14px;}
  input:focus { outline:none; border-color:#3b82f6; }
  button { margin-top:20px; width:100%; padding:11px; background:#3b82f6; color:white; border:none;
    border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
  button:hover { background:#2563eb; }
  .err { background:#7f1d1d; color:#fecaca; padding:10px 12px; border-radius:8px; margin-bottom:12px; font-size:13px;}
</style>
</head>
<body>
<form class="card" method="post" action="/login">
  <h1>portly</h1>
  <p class="sub">Sign in to manage your reverse proxies.</p>
  {{if .Error}}<div class="err">{{.Error}}</div>{{end}}
  <input type="hidden" name="next" value="{{.Next}}">
  <label>Username</label>
  <input name="username" autocomplete="username" autofocus required>
  <label>Password</label>
  <input name="password" type="password" autocomplete="current-password" required>
  <button type="submit">Sign in</button>
</form>
</body>
</html>
